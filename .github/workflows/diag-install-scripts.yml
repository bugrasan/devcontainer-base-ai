name: "DIAG - install script TTY probe (temporary, safe to delete)"

# Throwaway diagnostic: this sandbox's own outbound proxy blocks
# claude.ai/downloads.claude.ai and pi.dev, so it can't fetch or run these
# scripts directly. A GitHub Actions runner has normal internet access and is
# non-interactive (no TTY, no stdin) exactly like a Dockerfile RUN or a
# devcontainer Feature's install.sh - so this reproduces that failure mode
# for real, on real infra, and prints the script content for analysis.
on:
  push:
    branches:
      - claude/devcontainer-npm-sshd-setup-n1ec4s
    paths:
      - ".github/workflows/diag-install-scripts.yml"
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: "claude.ai/install.sh"
        run: |
          set +e
          echo "=== fetching ==="
          curl -fsSL https://claude.ai/install.sh -o /tmp/claude-install.sh
          echo "fetch exit: $?"
          echo "=== content ==="
          cat /tmp/claude-install.sh
          echo "=== executing non-interactively (no tty, no stdin - like a Dockerfile RUN) ==="
          bash /tmp/claude-install.sh < /dev/null
          echo "claude install exit: $?"

      - name: "pi.dev/install.sh"
        run: |
          set +e
          echo "=== fetching ==="
          curl -fsSL https://pi.dev/install.sh -o /tmp/pi-install.sh
          echo "fetch exit: $?"
          echo "=== content ==="
          cat /tmp/pi-install.sh
          echo "=== executing non-interactively (no tty, no stdin - like a Dockerfile RUN) ==="
          sh /tmp/pi-install.sh < /dev/null
          echo "pi install exit: $?"

      - name: "verify resulting binaries"
        run: |
          set +e
          echo "PATH=$PATH"
          command -v claude && claude --version
          command -v pi && pi --version
          echo "=== searching HOME for installed binaries ==="
          find "$HOME" -maxdepth 5 \( -iname "claude" -o -iname "pi" \) 2>/dev/null
