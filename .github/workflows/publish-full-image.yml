name: "Publish :full Dev Container Image"

# Scheduled rebuild only - keeps the full image (base + npm-dependent CLIs + sshd)
# up to date. GitHub Actions schedules are UTC-only (no DST adjustment).
# 07:30 UTC every Saturday - after the base image's 06:54 UTC rebuild, since this
# image is built FROM the published base:latest tag.
# Also rebuild when the full definition or this workflow changes.
on:
  push:
    branches:
      - main
    paths:
      - ".devcontainer/full/**"
      - ".github/workflows/publish-full-image.yml"
  schedule:
    - cron: "30 7 * * 6"
  workflow_dispatch: {}

jobs:
  # Native per-arch builds using GitHub's hosted amd64/arm64 runners - no QEMU
  # emulation needed (public repos get free ubuntu-24.04-arm runners), so this
  # is faster and avoids emulation compatibility issues.
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Builds .devcontainer/full/devcontainer.json (Dockerfile FROM the published
      # base:latest image + the sshd Feature baked in via the devcontainer CLI) and
      # pushes the platform-specific image to GHCR (tag suffix auto-derived, e.g.
      # latest-linux-amd64).
      - name: Build and push full image
        uses: devcontainers/ci@v0.3
        with:
          configFile: .devcontainer/full/devcontainer.json
          imageName: ghcr.io/bugrasan/devcontainer-base-ai/full
          platform: ${{ matrix.platform }}
          useNativeRunner: true
          push: always

  # Combines the per-platform images built above into a single multi-arch manifest.
  manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Merge platform images into multi-arch manifest
        uses: devcontainers/ci/merge@v0.3
        with:
          imageName: ghcr.io/bugrasan/devcontainer-base-ai/full
          platforms: linux/amd64,linux/arm64

  # Verify the published multi-arch image contains the expected tools.
  smoke-test:
    needs: manifest
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
    runs-on: ${{ matrix.platform == 'linux/amd64' && 'ubuntu-latest' || 'ubuntu-24.04-arm' }}
    permissions:
      packages: read
      contents: read
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image and verify tools
        run: |
          docker pull ghcr.io/bugrasan/devcontainer-base-ai/full:latest
          docker run --rm ghcr.io/bugrasan/devcontainer-base-ai/full:latest bash -c '
            set -e
            echo "=== Smoke Test ==="
            command -v node || exit 1
            echo "✓ node found"
            command -v python3 || exit 1
            echo "✓ python3 found"
            command -v gh || exit 1
            echo "✓ gh found"
            command -v copilot || exit 1
            echo "✓ copilot found"
            command -v uv || exit 1
            echo "✓ uv found"
            command -v eslint || exit 1
            echo "✓ eslint found"
            command -v tsc || exit 1
            echo "✓ tsc found"
            command -v mmdc || exit 1
            echo "✓ mmdc (mermaid-cli) found"
            command -v claude || exit 1
            echo "✓ claude found"
            claude --version
            echo "✓ All tools verified"
          '
          docker run --rm --user root ghcr.io/bugrasan/devcontainer-base-ai/full:latest bash -c '
            set -e
            command -v sshd || exit 1
            echo "✓ sshd found"
            grep -qE "^Port 2222" /etc/ssh/sshd_config || exit 1
            echo "✓ sshd configured on port 2222"
          '
