name: "Publish :base Dev Container Image"

# Scheduled rebuild only - keeps the base image's OS/apt packages and Features
# up to date. GitHub Actions schedules are UTC-only (no DST adjustment).
# 06:54 UTC every Saturday.
# Also rebuild when the base definition or this workflow changes.
on:
  push:
    branches:
      - main
    paths:
      - ".devcontainer/base/**"
      - ".github/workflows/publish-base-image.yml"
  schedule:
    - cron: "54 6 * * 6"
  workflow_dispatch: {}

env:
  IMAGE: ghcr.io/bugrasan/devcontainer-base-ai/base

jobs:
  # Native per-arch builds using GitHub's hosted amd64/arm64 runners - no QEMU
  # emulation needed (public repos get free ubuntu-24.04-arm runners), so this
  # is faster and avoids emulation compatibility issues.
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
            tagSuffix: latest-linux-amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
            tagSuffix: latest-linux-arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli

      # Builds .devcontainer/base/devcontainer.json (Dockerfile + Features baked in
      # by the devcontainer CLI) and pushes the platform-specific image to GHCR
      # (e.g. :latest-linux-amd64).
      #
      # `--push true` makes the CLI run `docker buildx build --push`, i.e. buildkit's
      # REGISTRY exporter: compressed layers stream straight from buildkit to GHCR.
      # This deliberately avoids the devcontainers/ci push path, which exported the
      # whole image to a docker tarball, imported it into the docker daemon, then
      # `docker push`ed it - ~2.5 min/arch of pure round-trip that a direct push
      # eliminates (a cold build+push dropped from ~7.5 min to ~3 min/arch).
      #
      # Cache uses a dedicated :buildcache-<arch> tag with mode=max (every
      # intermediate layer, not just the final ones). A separate cache ref is
      # required so type=registry,mode=max doesn't overwrite the published image.
      #
      # noCache is forced on the scheduled run only: a Docker layer's cache key
      # depends on its instruction text + parent layer, not on whether re-running
      # it would fetch different content - so 'apt-get upgrade' would otherwise keep
      # replaying last week's cached (stale) package versions on every push/dispatch
      # build, silently defeating the one job this weekly cron exists for. Every
      # other trigger still benefits from the cache.
      - name: Build and push base image (direct registry export)
        run: |
          devcontainer build \
            --workspace-folder . \
            --config .devcontainer/base/devcontainer.json \
            --image-name "${IMAGE}:${{ matrix.tagSuffix }}" \
            --platform ${{ matrix.platform }} \
            --push true \
            --cache-from "type=registry,ref=${IMAGE}:buildcache-${{ matrix.arch }}" \
            --cache-to   "type=registry,ref=${IMAGE}:buildcache-${{ matrix.arch }},mode=max" \
            ${{ github.event_name == 'schedule' && '--no-cache' || '' }}

  # Combines the per-platform images built above into a single multi-arch manifest
  # published as :latest (what ../devcontainer.json consumes). imagetools works
  # directly on registry manifests - it does not pull or re-push layer blobs, so it
  # stays a few seconds regardless of image size.
  manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Merge platform images into multi-arch manifest
        run: |
          docker buildx imagetools create -t "${IMAGE}:latest" \
            "${IMAGE}:latest-linux-amd64" \
            "${IMAGE}:latest-linux-arm64"

  # Verify the published multi-arch image contains the expected tools.
  smoke-test:
    needs: manifest
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
    runs-on: ${{ matrix.platform == 'linux/amd64' && 'ubuntu-latest' || 'ubuntu-24.04-arm' }}
    permissions:
      packages: read
      contents: read
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image and verify tools
        run: |
          docker pull ghcr.io/bugrasan/devcontainer-base-ai/base:latest
          docker run --rm ghcr.io/bugrasan/devcontainer-base-ai/base:latest bash -c '
            set -e
            echo "=== Smoke Test ==="
            command -v node || exit 1
            echo "✓ node found"
            node --version
            command -v python3 || exit 1
            echo "✓ python3 found"
            python3 --version
            command -v gh || exit 1
            echo "✓ gh found"
            gh --version
            command -v copilot || exit 1
            echo "✓ copilot found"
            copilot --version
            command -v uv || exit 1
            echo "✓ uv found"
            uv --version
            command -v eslint || exit 1
            echo "✓ eslint found"
            command -v tsc || exit 1
            echo "✓ tsc found"
            command -v pyright-langserver || exit 1
            echo "✓ pyright-langserver found"
            command -v typescript-language-server || exit 1
            echo "✓ typescript-language-server found"
            [ "$ENABLE_LSP_TOOL" = "1" ] || exit 1
            echo "✓ ENABLE_LSP_TOOL=1 baked in"
            command -v claude || exit 1
            echo "✓ claude found"
            claude --version
            command -v pi || exit 1
            echo "✓ pi found"
            pi --version
            command -v sshd || exit 1
            echo "✓ sshd found"
            grep -qE "^Port 2222" /etc/ssh/sshd_config || exit 1
            echo "✓ sshd configured on port 2222"
            echo "✓ All tools verified"
          '
