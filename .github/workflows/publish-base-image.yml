name: "Publish :base Dev Container Image"

# Scheduled rebuild only - keeps the base image's OS/apt packages and Features
# up to date. GitHub Actions schedules are UTC-only (no DST adjustment).
# 06:54 UTC every Saturday.
on:
  schedule:
    - cron: "54 6 * * 6"
  workflow_dispatch: {}

jobs:
  # Native per-arch builds using GitHub's hosted amd64/arm64 runners - no QEMU
  # emulation needed (public repos get free ubuntu-24.04-arm runners), so this
  # is faster and avoids emulation compatibility issues.
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Builds .devcontainer/base/devcontainer.json (Dockerfile.trixie + Features
      # baked in via the devcontainer CLI) and pushes the platform-specific
      # image to GHCR (tag suffix auto-derived, e.g. latest-linux-amd64).
      - name: Build and push base image
        uses: devcontainers/ci@v0.3
        with:
          configFile: .devcontainer/base/devcontainer.json
          imageName: ghcr.io/bugrasan/devcontainer-base-ai/base
          platform: ${{ matrix.platform }}
          useNativeRunner: true
          push: always

  # Combines the per-platform images built above into a single multi-arch manifest.
  manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Merge platform images into multi-arch manifest
        uses: devcontainers/ci/merge@v0.3
        with:
          imageName: ghcr.io/bugrasan/devcontainer-base-ai/base
          platforms: linux/amd64,linux/arm64
