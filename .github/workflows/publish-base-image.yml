name: "Publish :base Dev Container Image"

# Scheduled rebuild only - keeps the base image's OS/apt packages and Features
# up to date. GitHub Actions schedules are UTC-only (no DST adjustment).
# 06:54 UTC every Saturday.
# Also rebuild when the base definition or this workflow changes.
on:
  push:
    branches:
      - main
    paths:
      - ".devcontainer/base/**"
      - ".github/workflows/publish-base-image.yml"
  schedule:
    - cron: "54 6 * * 6"
  workflow_dispatch: {}

jobs:
  # Native per-arch builds using GitHub's hosted amd64/arm64 runners - no QEMU
  # emulation needed (public repos get free ubuntu-24.04-arm runners), so this
  # is faster and avoids emulation compatibility issues.
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            tagSuffix: latest-linux-amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            tagSuffix: latest-linux-arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Builds .devcontainer/base/devcontainer.json (Dockerfile.trixie + Features
      # baked in via the devcontainer CLI) and pushes the platform-specific
      # image to GHCR (tag suffix auto-derived, e.g. latest-linux-amd64).
      #
      # cacheFrom/cacheTo point at that same previous platform tag so unchanged
      # Feature layers (most of them, most weeks) are reused instead of being
      # rebuilt and re-downloaded from scratch on every run - previously there
      # was no cross-run cache at all.
      - name: Build and push base image
        uses: devcontainers/ci@v0.3
        with:
          configFile: .devcontainer/base/devcontainer.json
          imageName: ghcr.io/bugrasan/devcontainer-base-ai/base
          platform: ${{ matrix.platform }}
          useNativeRunner: true
          push: always
          cacheFrom: ghcr.io/bugrasan/devcontainer-base-ai/base:${{ matrix.tagSuffix }}
          cacheTo: ghcr.io/bugrasan/devcontainer-base-ai/base:${{ matrix.tagSuffix }}

  # Combines the per-platform images built above into a single multi-arch manifest.
  manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Merge platform images into multi-arch manifest
        uses: devcontainers/ci/merge@v0.3
        with:
          imageName: ghcr.io/bugrasan/devcontainer-base-ai/base
          platforms: linux/amd64,linux/arm64

  # Verify the published multi-arch image contains the expected tools.
  smoke-test:
    needs: manifest
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
    runs-on: ${{ matrix.platform == 'linux/amd64' && 'ubuntu-latest' || 'ubuntu-24.04-arm' }}
    permissions:
      packages: read
      contents: read
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image and verify tools
        run: |
          docker pull ghcr.io/bugrasan/devcontainer-base-ai/base:latest
          docker run --rm ghcr.io/bugrasan/devcontainer-base-ai/base:latest bash -c '
            set -e
            echo "=== Smoke Test ==="
            command -v node || exit 1
            echo "✓ node found"
            node --version
            command -v python3 || exit 1
            echo "✓ python3 found"
            python3 --version
            command -v gh || exit 1
            echo "✓ gh found"
            gh --version
            command -v copilot || exit 1
            echo "✓ copilot found"
            copilot --version
            command -v uv || exit 1
            echo "✓ uv found"
            uv --version
            command -v eslint || exit 1
            echo "✓ eslint found"
            command -v tsc || exit 1
            echo "✓ tsc found"
            command -v mmdc || exit 1
            echo "✓ mmdc (mermaid-cli) found"
            command -v claude || exit 1
            echo "✓ claude found"
            claude --version
            command -v pi || exit 1
            echo "✓ pi found"
            pi --version
            command -v sshd || exit 1
            echo "✓ sshd found"
            grep -qE "^Port 2222" /etc/ssh/sshd_config || exit 1
            echo "✓ sshd configured on port 2222"
            echo "✓ All tools verified"
          '

